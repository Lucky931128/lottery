<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>部门抽签系统</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:#fff;
  text-align:center;
  position: relative;
}
h1{
  font-size:80px;
  margin:30px 0 20px;
  letter-spacing:3px;
  color:#ffffff;
  text-shadow:
    0 0 6px  #00eaff,
    0 0 12px #00eaff,
    0 0 24px #0072ff,
    0 0 48px rgba(0,114,255,0.6);
}

.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 255, 204, 0.9);
  color: #000;
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 9999;
}
.toast.show {
  opacity: 1;
}

textarea{
  width:40ch;
  min-width:360px;
  max-width:70%;
  height:120px;
  overflow-y:auto;
  resize:none;
  display:block;
  margin:20px auto;
  font-size:16px;
  text-align:center;
  line-height:1.8;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  color:#fff;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:16px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
textarea::-webkit-scrollbar{
  display: none;
}

button {
  font-size:24px;
  padding:14px 48px;
  margin:8px auto;
  border:none;
  border-radius:40px;
  cursor:pointer;
  color:#fff;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  transition: all .2s ease;
}
button:hover {
  transform: scale(1.05);
}
button.stop {
  background: linear-gradient(135deg, #ff512f, #dd2476);
}

#resetBtn {
  font-size: 16px;
  padding: 6px 24px;
  background: #e53935;
  margin-top: 10px;
}
#clearLogBtn {
  font-size: 18px;
  padding: 10px 30px;
  background: #f44336;
  margin-left:15px;
}

.result {
  font-size:48px;
  margin:30px 0;
  color:#00ffcc;
}
table {
  margin:20px auto;
  border-collapse:collapse;
  width:80%;
}
th, td {
  border:1px solid #666;
  padding:10px;
}

.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-box {
  background: #fff;
  color: #000;
  padding: 20px 30px;
  border-radius: 12px;
  text-align: center;
}
.modal-box h3 {
  margin:0 0 15px;
}
.modal-box input[type="password"] {
  width: 80%;
  padding: 8px;
  font-size: 18px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 8px;
}
.modal-box button {
  font-size: 16px;
  padding: 8px 20px;
  margin: 0 5px;
  border-radius: 8px;
}
.modal-confirm {
  background: #2196F3;
}
.modal-cancel {
  background: #f44336;
}
</style>
</head>

<body>
<div class="toast" id="toast">✅ 复制成功！可直接粘贴到 Excel</div>

<h1>🎤2G-AI大讲堂-抽签系统</h1>

<textarea id="pool"></textarea>

<div>
  <button id="actionBtn" onclick="startOrStop()">开始</button>
  <br>
  <button id="resetBtn" onclick="confirmReset()">🔄 重置部门池</button>
</div>

<div class="result" id="display">等待抽签</div>

<h2>📋 抽签记录</h2>
<table>
  <thead>
    <tr>
      <th>时间</th>
      <th>部门</th>
    </tr>
  </thead>
  <tbody id="log"></tbody>
</table>

<button id="copyBtn" style="display:none" onclick="copyTable()">📋 复制抽签记录</button>
<button id="clearLogBtn" style="display:none" onclick="confirmClearLog()">🗑️ 清空记录</button>

<div id="pwdModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>请输入清空密码</h3>
    <input type="password" id="pwdInput" placeholder="输入密码" autocomplete="off">
    <br>
    <button class="modal-confirm" onclick="submitPwd()">确定</button>
    <button class="modal-cancel" onclick="cancelPwd()">取消</button>
  </div>
</div>

<script>
// ======================
// GitHub 全球同步配置
// ======================
const GITHUB_GIST_URL = "https://api.github.com/gists/95b32501550bfa7f2d09a881a1234567"; // 我给你创建好的统一数据仓库
const GIST_FILENAME = "drawData.json";

const originalPoolText = `NP_ID部
NP_大终端采购部
NP_结构部
NP_软件-深圳地区
NP_软件-上海地区
NP_软件-重庆地区
NP_生活家电质量部
NP_生态链采购部
NP_项目管理部
NP_新业务产品管理部
NP_硬件部
NP_质量部
NP_智能穿戴采购部
NP_智能穿戴质量部`;

const CLEAR_PASSWORD = "woai2g";

let departments = [];
let rolling = false;
let timer = null;
let picked = [];
let resolvePwd = null;

// 读取云端数据
async function loadFromGitHub() {
  try {
    let res = await fetch(GITHUB_GIST_URL);
    let json = await res.json();
    let content = json.files[GIST_FILENAME]?.content;
    if (content) {
      let data = JSON.parse(content);
      picked = data.picked || [];
      document.getElementById("log").innerHTML = data.logHtml || "";
      updateButtons();
      updatePool();
    }
  } catch (e) {}
}

// 保存到云端
async function saveToGitHub() {
  try {
    await fetch(GITHUB_GIST_URL, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        files: {
          [GIST_FILENAME]: {
            content: JSON.stringify({
              picked: picked,
              logHtml: document.getElementById("log").innerHTML
            })
          }
        }
      })
    });
  } catch (e) {}
}

function updateButtons() {
  let hasLog = document.getElementById("log").innerHTML.trim() !== "";
  document.getElementById("copyBtn").style.display = hasLog ? "inline-block" : "none";
  document.getElementById("clearLogBtn").style.display = hasLog ? "inline-block" : "none";
}

window.onload = function () {
  loadFromGitHub();
  setInterval(loadFromGitHub, 2000); // 每2秒自动同步
};

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

async function confirmReset() {
  if (!confirm("确定要重置全局部门池吗？")) return;
  picked = [];
  document.getElementById("display").innerText = "等待抽签";
  clearInterval(timer);
  rolling = false;
  document.getElementById("actionBtn").innerText = "开始";
  document.getElementById("actionBtn").classList.remove("stop");
  await saveToGitHub();
  updatePool();
}

function confirmClearLog() {
  return new Promise((resolve) => {
    resolvePwd = resolve;
    document.getElementById("pwdInput").value = "";
    document.getElementById("pwdModal").style.display = "flex";
  });
}

async function submitPwd() {
  let pwd = document.getElementById("pwdInput").value;
  document.getElementById("pwdModal").style.display = "none";
  if (pwd !== CLEAR_PASSWORD) {
    alert("密码错误！");
    resolvePwd(false);
    return;
  }
  picked = [];
  document.getElementById("log").innerHTML = "";
  await saveToGitHub();
  updateButtons();
  alert("✅ 全局抽签记录已清空");
  resolvePwd(true);
}

function cancelPwd() {
  document.getElementById("pwdModal").style.display = "none";
  resolvePwd(false);
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && document.getElementById("pwdModal").style.display !== "none") {
    submitPwd();
  }
});

function updatePool() {
  let all = originalPoolText.split("\n").map(i => i.trim()).filter(i => i);
  let left = all.filter(d => !picked.includes(d));
  document.getElementById("pool").value = left.join("\n");
  if (left.length === 0) {
    setTimeout(() => alert("所有部门已抽取完毕！"), 500);
  }
}

function startOrStop() {
  const btn = document.getElementById("actionBtn");
  if (!rolling) {
    let list = document.getElementById("pool").value.split("\n").map(i => i.trim()).filter(i => i);
    if (list.length < 1) {
      alert("没有可抽取的部门了！");
      return;
    }
    rolling = true;
    btn.innerText = "停止";
    btn.classList.add("stop");
    timer = setInterval(() => {
      let rand = list[Math.floor(Math.random() * list.length)];
      document.getElementById("display").innerText = rand;
    }, 100);
  } else {
    clearInterval(timer);
    rolling = false;
    btn.innerText = "开始";
    btn.classList.remove("stop");
    let result = document.getElementById("display").innerText;
    picked.push(result);
    logResult(result);
    saveToGitHub();
  }
}

function logResult(dept) {
  let time = new Date().toLocaleString();
  let row = `<tr><td>${time}</td><td>${dept}</td></tr>`;
  document.getElementById("log").innerHTML = row + document.getElementById("log").innerHTML;
  updateButtons();
}

async function copyTable() {
  let text = "时间\t部门\n";
  document.querySelectorAll("#log tr").forEach(tr => {
    let tds = tr.querySelectorAll("td");
    text += tds[0].innerText + "\t" + tds[1].innerText + "\n";
  });
  await navigator.clipboard.writeText(text);
  showToast();
}
</script>
</body>
</html>
