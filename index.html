<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>部门抽签系统</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:#fff;
  text-align:center;
  position: relative;
}
h1{
  font-size:80px;
  margin:30px 0 20px;
  letter-spacing:3px;
  color:#ffffff;
  text-shadow:
    0 0 6px  #00eaff,
    0 0 12px #00eaff,
    0 0 24px #0072ff,
    0 0 48px rgba(0,114,255,0.6);
}

/* ✅ 复制成功浮动提示 */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 255, 204, 0.9);
  color: #000;
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 9999;
}
.toast.show {
  opacity: 1;
}

/* ✅ textarea 已隐藏滚动条 */
textarea{
  width:40ch;
  min-width:360px;
  max-width:70%;
  height:120px;
  overflow-y:auto;
  resize:none;
  display:block;
  margin:20px auto;
  font-size:16px;
  text-align:center;
  line-height:1.8;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  color:#fff;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:16px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
textarea::-webkit-scrollbar{
  display: none;
}

button {
  font-size:24px;
  padding:14px 48px;
  margin:20px;
  border:none;
  border-radius:40px;
  cursor:pointer;
  color:#fff;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  transition: all .2s ease;
}
button:hover {
  transform: scale(1.05);
}
button.stop {
  background: linear-gradient(135deg, #ff512f, #dd2476);
}

/* 红色小重置按钮 */
#resetBtn {
  font-size: 16px;
  padding: 6px 18px;
  margin: 0 auto 20px;
  display: inline-block;
  background: #e53935;
}

.result {
  font-size:48px;
  margin:30px 0;
  color:#00ffcc;
}
table {
  margin:20px auto;
  border-collapse:collapse;
  width:80%;
}
th, td {
  border:1px solid #666;
  padding:10px;
}
</style>
</head>

<body>
<div class="toast" id="toast">✅ 复制成功！可直接粘贴到 Excel</div>

<h1>🎤2G-AI大讲堂-抽签系统</h1>

<textarea id="pool">NP_ID部
NP_大终端采购部
NP_结构部
NP_软件测试部
NP_手机软件开发部
NP_智能产品软件开发部
NP_生活家电质量部
NP_生态链采购部
NP_项目管理部
NP_新业务产品管理部
NP_硬件部
NP_质量部
NP_智能穿戴采购部
NP_智能穿戴质量部</textarea>

<button id="resetBtn" onclick="resetPool()">🔄 重置</button>

<div>
  <button id="actionBtn" onclick="startOrStop()">开始</button>
</div>

<div class="result" id="display">等待抽签</div>

<h2>📋 抽签记录</h2>
<table>
  <thead>
    <tr>
      <th>时间</th>
      <th>部门</th>
    </tr>
  </thead>
  <tbody id="log"></tbody>
</table>

<button id="copyBtn" style="display:none" onclick="copyTable()">📋 复制抽签记录</button>

<script>
// 原始固定部门列表
const originalPoolText = `NP_ID部
NP_大终端采购部
NP_结构部
NP_软件测试部
NP_手机软件开发部
NP_智能产品软件开发部
NP_生活家电质量部
NP_生态链采购部
NP_项目管理部
NP_新业务产品管理部
NP_硬件部
NP_质量部
NP_智能穿戴采购部
NP_智能穿戴质量部`;

let departments = [];
let rolling = false;
let timer = null;
let picked = [];

// 页面加载读取本地存储
window.onload = function(){
  // 恢复已抽部门
  if(localStorage.getItem('picked')){
    picked = JSON.parse(localStorage.getItem('picked'));
  }
  // 恢复抽签记录
  if(localStorage.getItem('logHtml')){
    document.getElementById('log').innerHTML = localStorage.getItem('logHtml');
    document.getElementById('copyBtn').style.display = "inline-block";
  }
  // 刷新文本框剩余部门
  updatePool();
}

// 保存到本地存储
function saveLocal(){
  localStorage.setItem('picked', JSON.stringify(picked));
  localStorage.setItem('logHtml', document.getElementById('log').innerHTML);
}

// 显示提示
function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

// 完全重置（只点重置按钮才触发）
function resetPool() {
  clearInterval(timer);
  rolling = false;
  picked = [];
  // 恢复原始文本
  document.getElementById("pool").value = originalPoolText;
  document.getElementById("display").innerText = "等待抽签";
  document.getElementById("log").innerHTML = "";
  document.getElementById("actionBtn").innerText = "开始";
  document.getElementById("actionBtn").classList.remove("stop");
  document.getElementById("copyBtn").style.display = "none";
  // 清空本地存储
  localStorage.removeItem('picked');
  localStorage.removeItem('logHtml');
}

// 更新文本框剩余部门
function updatePool() {
  const pool = document.getElementById("pool");
  const allDept = originalPoolText.split("\n")
    .map(d => d.trim())
    .filter(d => d);
  
  const remaining = allDept.filter(d => !picked.includes(d));
  pool.value = remaining.join("\n");

  // 抽完自动重置
  if (remaining.length === 0) {
    setTimeout(() => {
      alert("所有部门已抽取完毕，自动重置！");
      resetPool();
    }, 300);
  }
}

function startOrStop() {
  const btn = document.getElementById("actionBtn");

  if (!rolling) {
    departments = document.getElementById("pool").value
      .split("\n")
      .map(d => d.trim())
      .filter(d => d && !picked.includes(d));

    if (departments.length < 1) {
      alert("没有可抽取的部门了！");
      return;
    }

    rolling = true;
    btn.innerText = "停止";
    btn.classList.add("stop");

    timer = setInterval(() => {
      const rand = departments[Math.floor(Math.random() * departments.length)];
      document.getElementById("display").innerText = rand;
    }, 100);

  } else {
    clearInterval(timer);
    rolling = false;
    btn.innerText = "开始";
    btn.classList.remove("stop");

    const result = document.getElementById("display").innerText;
    picked.push(result);
    logResult(result);
    updatePool();
    saveLocal(); // 每次抽完保存进度
  }
}

function logResult(dept) {
  const time = new Date().toLocaleString();
  document.getElementById("log").innerHTML +=
    `<tr><td>${time}</td><td>${dept}</td></tr>`;
  document.getElementById("copyBtn").style.display = "inline-block";
}

// 复制记录
async function copyTable() {
  let text = "时间\t部门\n";
  document.querySelectorAll("#log tr").forEach(tr => {
    const tds = tr.querySelectorAll("td");
    text += tds[0].innerText + "\t" + tds[1].innerText + "\n";
  });

  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    document.execCommand('copy');
    textArea.removeChild(textArea);
  }
  showToast();
}
</script>
</body>
</html>
