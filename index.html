<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>部门抽签系统</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:#fff;
  text-align:center;
}
h1{
  font-size:80px;
  margin:30px 0 20px;
  letter-spacing:3px;
  color:#ffffff;
  text-shadow:
    0 0 6px  #00eaff,
    0 0 12px #00eaff,
    0 0 24px #0072ff,
    0 0 48px rgba(0,114,255,0.6);
}

/* ✅ 重点修改区 */
textarea{
  width:40ch;              /* ✅ 宽度 ×2（原 20ch） */
  min-width:360px;
  max-width:70%;

  height:60px;             /* ✅ 高度 ÷2（原 120px） */
  overflow-y:auto;         /* ✅ 超出滚动 */
  resize:none;

  display:block;
  margin:20px auto;

  font-size:16px;
  text-align:center;
  line-height:1.8;

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  color:#fff;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:16px;
}

button {
  font-size:24px;
  padding:14px 48px;
  margin:20px;
  border:none;
  border-radius:40px;
  cursor:pointer;
  color:#fff;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  transition: all .2s ease;
}
button:hover {
  transform: scale(1.05);
}
button.stop {
  background: linear-gradient(135deg, #ff512f, #dd2476);
}
.result {
  font-size:48px;
  margin:30px 0;
  color:#00ffcc;
}
table {
  margin:20px auto;
  border-collapse:collapse;
  width:80%;
}
th, td {
  border:1px solid #666;
  padding:10px;
}
</style>
</head>

<body>
<h1>🎤2G-AI大讲堂-抽签系统</h1>

<textarea id="pool">NP_ID部
NP_大终端采购部
NP_结构部
NP_软件测试部
NP_手机软件开发部
NP_智能产品软件开发部
NP_生活家电质量部
NP_生态链采购部
NP_项目管理部
NP_新业务产品管理部
NP_硬件部
NP_质量部
NP_智能穿戴采购部
NP_智能穿戴质量部</textarea>

<div>
  <button id="actionBtn" onclick="startOrStop()">开始</button>
</div>

<div class="result" id="display">等待抽签</div>

<h2>📋 抽签记录</h2>
<table>
  <thead>
    <tr>
      <th>时间</th>
      <th>部门</th>
    </tr>
  </thead>
  <tbody id="log"></tbody>
</table>

<button id="copyBtn" style="display:none" onclick="copyTable()">📋 复制抽签记录</button>

<script>
let departments = [];
let rolling = false;
let timer = null;
let picked = [];

function startOrStop() {
  const btn = document.getElementById("actionBtn");

  if (!rolling) {
    departments = document.getElementById("pool").value
      .split("\n")
      .map(d => d.trim())
      .filter(d => d && !picked.includes(d));

    if (departments.length < 1) {
      alert("没有可抽取的部门了！");
      return;
    }

    rolling = true;
    btn.innerText = "停止";
    btn.classList.add("stop");

    timer = setInterval(() => {
      const rand = departments[Math.floor(Math.random() * departments.length)];
      document.getElementById("display").innerText = rand;
    }, 100);

  } else {
    clearInterval(timer);
    rolling = false;
    btn.innerText = "开始";
    btn.classList.remove("stop");

    const result = document.getElementById("display").innerText;
    picked.push(result);
    logResult(result);
  }
}

function logResult(dept) {
  const time = new Date().toLocaleString();
  document.getElementById("log").innerHTML +=
    `<tr><td>${time}</td><td>${dept}</td></tr>`;
  document.getElementById("copyBtn").style.display = "inline-block";
}

function copyTable() {
  let text = "时间\t部门\n";
  document.querySelectorAll("#log tr").forEach(tr => {
    const tds = tr.querySelectorAll("td");
    text += tds[0].innerText + "\t" + tds[1].innerText + "\n";
  });
  navigator.clipboard.writeText(text);
  alert("已复制，直接粘贴到 Excel ✅");
}
</script>
</body>
</html>
