<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>部门抽签系统</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:#fff;
  text-align:center;
  position: relative;
}
h1{
  font-size:80px;
  margin:30px 0 20px;
  letter-spacing:3px;
  color:#ffffff;
  text-shadow:
    0 0 6px  #00eaff,
    0 0 12px #00eaff,
    0 0 24px #0072ff,
    0 0 48px rgba(0,114,255,0.6);
}

.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 255, 204, 0.9);
  color: #000;
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 9999;
}
.toast.show {
  opacity: 1;
}

textarea{
  width:40ch;
  min-width:360px;
  max-width:70%;
  height:120px;
  overflow-y:auto;
  resize:none;
  display:block;
  margin:20px auto;
  font-size:16px;
  text-align:center;
  line-height:1.8;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(6px);
  color:#fff;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:16px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
textarea::-webkit-scrollbar{
  display: none;
}

button {
  font-size:24px;
  padding:14px 48px;
  margin:8px auto;
  border:none;
  border-radius:40px;
  cursor:pointer;
  color:#fff;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  transition: all .2s ease;
}
button:hover {
  transform: scale(1.05);
}
button.stop {
  background: linear-gradient(135deg, #ff512f, #dd2476);
}

#resetBtn {
  font-size: 16px;
  padding: 6px 24px;
  background: #e53935;
  margin-top: 10px;
}
#clearLogBtn {
  font-size: 18px;
  padding: 10px 30px;
  background: #f44336;
  margin-left:15px;
}
.oper-btn{
  font-size:14px;padding:5px 15px;margin:0 5px;
}
.result {
  font-size:48px;
  margin:30px 0;
  color:#00ffcc;
}
table {
  margin:20px auto;
  border-collapse:collapse;
  width:80%;
}
th, td {
  border:1px solid #666;
  padding:10px;
}

.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-box {
  background: #fff;
  color: #000;
  padding: 20px 30px;
  border-radius: 12px;
  text-align: center;
}
.modal-box h3 {
  margin:0 0 15px;
}
.modal-box input[type="password"] {
  width: 80%;
  padding: 8px;
  font-size: 18px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 8px;
}
.modal-box button {
  font-size: 16px;
  padding: 8px 20px;
  margin: 0 5px;
  border-radius: 8px;
}
.modal-confirm {
  background: #2196F3;
}
.modal-cancel {
  background: #f44336;
}
</style>
</head>

<body>
<div class="toast" id="toast">✅ 操作成功</div>

<h1>🎤2G-AI大讲堂-抽签系统</h1>

<textarea id="pool"></textarea>

<div>
  <button id="actionBtn" onclick="startOrStop()">开始</button>
  <br>
  <button id="resetBtn" onclick="confirmReset()">🔄 重置部门池</button>
  <div style="margin:10px 0;">
    <button class="oper-btn" onclick="exportData()">📤导出全部数据</button>
    <button class="oper-btn" onclick="importData()">📥导入历史数据</button>
  </div>
</div>

<div class="result" id="display">等待抽签</div>

<h2>📋 抽签记录</h2>
<table>
  <thead>
    <tr>
      <th>时间</th>
      <th>部门</th>
    </tr>
  </thead>
  <tbody id="log"></tbody>
</table>

<button id="copyBtn" style="display:none" onclick="copyTable()">📋 复制抽签记录</button>
<button id="clearLogBtn" style="display:none" onclick="confirmClearLog()">🗑️ 清空记录</button>

<div id="pwdModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>请输入清空密码</h3>
    <input type="password" id="pwdInput" placeholder="输入密码" autocomplete="off">
    <br>
    <button class="modal-confirm" onclick="submitPwd()">确定</button>
    <button class="modal-cancel" onclick="cancelPwd()">取消</button>
  </div>
</div>
<input type="file" id="fileInput" style="display:none" accept=".json" onchange="readFile(this)">

<script>
const originalPoolText = `NP_ID部
NP_大终端采购部
NP_结构部
NP_软件-深圳地区
NP_软件-上海地区
NP_软件-重庆地区
NP_生活家电质量部
NP_生态链采购部
NP_项目管理部
NP_新业务产品管理部
NP_硬件部
NP_质量部
NP_智能穿戴采购部
NP_智能穿戴质量部`;

const CLEAR_PASSWORD = "woai2g";
const STORAGE_KEY = "draw_all_data";

let departments = [];
let rolling = false;
let timer = null;
let picked = [];
let resolvePwd = null;

// 页面加载读取本地数据
window.onload = function(){
  let localData = localStorage.getItem(STORAGE_KEY);
  if(localData){
    let obj = JSON.parse(localData);
    picked = obj.picked || [];
    document.getElementById('log').innerHTML = obj.logHtml || "";
  }
  updateBtnState();
  updatePool();
}

// 保存完整数据到本地
function saveLocalAll(){
  let saveObj = {
    picked:picked,
    logHtml:document.getElementById('log').innerHTML
  };
  localStorage.setItem(STORAGE_KEY,JSON.stringify(saveObj));
}

// 同标签页同步监听
window.addEventListener('storage',e=>{
  if(e.key === STORAGE_KEY){
    let obj = JSON.parse(e.newValue||"{}");
    picked = obj.picked||[];
    document.getElementById('log').innerHTML = obj.logHtml||"";
    updateBtnState();
    updatePool();
  }
});

function showToast(text="✅ 复制成功！可直接粘贴到 Excel") {
  const t = document.getElementById("toast");
  t.innerText = text;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

function updateBtnState(){
  let hasLog = document.getElementById('log').innerHTML.trim()!=='';
  document.getElementById("copyBtn").style.display = hasLog?"inline-block":"none";
  document.getElementById("clearLogBtn").style.display = hasLog?"inline-block":"none";
}

// 重置部门池
function confirmReset(){
  if(!confirm("确定要重置部门池吗？已抽中列表清空，记录保留")) return;
  picked = [];
  document.getElementById("display").innerText = "等待抽签";
  clearInterval(timer);
  rolling = false;
  document.getElementById("actionBtn").innerText = "开始";
  document.getElementById("actionBtn").classList.remove("stop");
  saveLocalAll();
  updatePool();
}

// 清空记录密码弹窗
function confirmClearLog(){
  return new Promise((resolve) => {
    resolvePwd = resolve;
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdModal').style.display = 'flex';
    setTimeout(()=>document.getElementById('pwdInput').focus(),10);
  });
}

async function submitPwd(){
  const inputPwd = document.getElementById('pwdInput').value;
  document.getElementById('pwdModal').style.display = 'none';
  if(inputPwd !== CLEAR_PASSWORD){
    alert("密码错误，无法清空记录！");
    resolvePwd(false);
    return;
  }
  document.getElementById("log").innerHTML = "";
  picked = [];
  document.getElementById("display").innerText = "等待抽签";
  clearInterval(timer);
  rolling = false;
  document.getElementById("actionBtn").innerText = "开始";
  document.getElementById("actionBtn").classList.remove("stop");
  saveLocalAll();
  updateBtnState();
  alert("✅ 密码正确，抽签记录已清空！");
  resolvePwd(true);
}

function cancelPwd(){
  document.getElementById('pwdModal').style.display = 'none';
  resolvePwd(false);
}

document.addEventListener('keydown',function(e){
  if(e.key === 'Enter' && document.getElementById('pwdModal').style.display !== 'none'){
    submitPwd();
  }
});

// 更新剩余部门
function updatePool() {
  const pool = document.getElementById("pool");
  const allDept = originalPoolText.split("\n").map(d=>d.trim()).filter(d=>d);
  const remaining = allDept.filter(d => !picked.includes(d));
  pool.value = remaining.join("\n");
  if (remaining.length === 0) {
    setTimeout(() => alert("所有部门已抽取完毕，请点击【重置部门池】！"),300);
  }
}

// 抽签逻辑
function startOrStop() {
  const btn = document.getElementById("actionBtn");
  if (!rolling) {
    departments = document.getElementById("pool").value.split("\n")
      .map(d=>d.trim()).filter(d=>d && !picked.includes(d));
    if (departments.length < 1) {
      alert("没有可抽取的部门了！请先重置部门池");
      return;
    }
    rolling = true;
    btn.innerText = "停止";
    btn.classList.add("stop");
    timer = setInterval(() => {
      const rand = departments[Math.floor(Math.random() * departments.length)];
      document.getElementById("display").innerText = rand;
    }, 100);
  } else {
    clearInterval(timer);
    rolling = false;
    btn.innerText = "开始";
    btn.classList.remove("stop");
    const result = document.getElementById("display").innerText;
    picked.push(result);
    logResult(result);
    saveLocalAll();
  }
}

function logResult(dept) {
  const time = new Date().toLocaleString();
  const newRow = `<tr><td>${time}</td><td>${dept}</td></tr>`;
  document.getElementById("log").innerHTML = newRow + document.getElementById("log").innerHTML;
  updateBtnState();
}

// 复制表格
async function copyTable() {
  let text = "时间\t部门\n";
  document.querySelectorAll("#log tr").forEach(tr => {
    const tds = tr.querySelectorAll("td");
    text += tds[0].innerText + "\t" + tds[1].innerText + "\n";
  });
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    document.execCommand('copy');
    document.body.removeChild(textArea);
  }
  showToast();
}

// 导出全部数据json
function exportData(){
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  let blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  let a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "抽签完整数据.json";
  a.click();
  showToast("✅ 数据导出成功");
}

// 导入数据
function importData(){
  document.getElementById('fileInput').click();
}
function readFile(el){
  let file = el.files[0];
  if(!file)return;
  let reader = new FileReader();
  reader.onload=function(e){
    try{
      let obj = JSON.parse(e.target.result);
      localStorage.setItem(STORAGE_KEY,JSON.stringify(obj));
      location.reload();
    }catch(err){
      alert("数据文件格式错误");
    }
  }
  reader.readAsText(file);
  el.value='';
}
</script>
</body>
</html>
